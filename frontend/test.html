<!DOCTYPE html>
<html>
<head>
  <title>PW Batches</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 1200px; margin: 0 auto; padding: 20px; background: #f0f4f8; }
    .batch-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
    .batch-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 16px; }
    .batch-card img { width: 100%; height: 150px; object-fit: cover; border-radius: 8px; }
    .batch-card h3 { margin: 10px 0 4px; font-size: 16px; }
    .batch-card p { color: #666; font-size: 14px; margin: 4px 0; }
    .batch-card .status { display: inline-block; padding: 2px 12px; border-radius: 12px; font-size: 12px; background: #c6f6d5; color: #22543d; }
    .loading { text-align: center; padding: 40px; font-size: 18px; }
    .loading .spinner { display: inline-block; width: 40px; height: 40px; border: 4px solid #e2e8f0; border-top-color: #4299e1; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { color: red; text-align: center; padding: 40px; }
    #loadMore { display: block; width: 200px; margin: 20px auto; padding: 12px; background: #4299e1; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
    #loadMore:hover { background: #2b6cb0; }
  </style>
</head>
<body>

  <h1>📚 PW Batches</h1>
  
  <div id="batchContainer">
    <div class="loading">
      <div class="spinner"></div>
      <p style="margin-top: 12px;">Loading batches...</p>
    </div>
  </div>
  
  <button id="loadMore" style="display:none;">Load More</button>

  <script>
    console.log('🚀 Script started at:', new Date().toLocaleTimeString());

    const TOKEN = 'eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJpYXQiOjE3ODQzMDE5NDgsImV4cCI6MTc4NDkwNjc0OC41NTEsImRhdGEiOnsiX2lkIjoiNjhlYjNkMWYwNTkxMWE3ZDU5OThkZWIxIiwidXNlcm5hbWUiOiI5MTAzODA4NzgyIiwiZmlyc3ROYW1lIjoiV2FyaXMgTXVraHRhciIsImxhc3ROYW1lIjoiIiwib3JnYW5pemF0aW9uIjp7Il9pZCI6IjVlYjM5M2VlOTVmYWI3NDY4YTc5ZDE4OSIsIndlYnNpdGUiOiJwaHlzaWNzd2FsbGFoLmNvbSIsIm5hbWUiOiJQaHlzaWNzd2FsbGFoIn0sInJvbGVzIjpbIjViMjdiZDk2NTg0MmY5NTBhNzc4YzZlZiJdLCJjb3VudHJ5R3JvdXAiOiJJTiIsIm9uZVJvbGVzIjpbXSwidHlwZSI6IlVTRVIifSwianRpIjoiUzVyWm15NFhRVTYyNGlYVlhiUlAyQV82OGViM2QxZjA1OTExYTdkNTk5OGRlYjEifQ.ZOUYaXDsi1w0oacKYllnwbGsqAp-y0l6iIzEuy8xmo0';

    console.log('✅ Token loaded');

    // Wait 2 seconds before doing anything (to show loading)
    setTimeout(() => {
      console.log('⏰ 2 seconds passed, starting API call...');
      loadBatches(1);
    }, 2000);

    let allBatches = [];
    let currentPage = 1;
    let totalPages = 1;
    let isLoading = false;

    const container = document.getElementById('batchContainer');
    const loadMoreBtn = document.getElementById('loadMore');

    console.log('✅ Elements found');

    function renderBatches(batches) {
      console.log('🎨 Rendering', batches.length, 'batches');
      
      if (!batches || batches.length === 0) {
        container.innerHTML = '<div class="error">❌ No batches found</div>';
        return;
      }

      let html = '<div class="batch-grid">';
      for (let i = 0; i < batches.length; i++) {
        const batch = batches[i];
        const img = batch.batchImage || 'https://via.placeholder.com/400x160/e2e8f0/718096?text=No+Image';
        html += `
          <div class="batch-card">
            <img src="${img}" alt="${batch.batchName}" onerror="this.src='https://via.placeholder.com/400x160/e2e8f0/718096?text=No+Image'">
            <h3>${batch.batchName || 'Untitled'}</h3>
            <p>${batch.byName || ''}</p>
            <p style="color:#888;font-size:12px;">📅 ${batch.startDate ? new Date(batch.startDate).toLocaleDateString() : 'TBD'}</p>
            <span class="status">${batch.isExternal ? 'Active' : 'Inactive'}</span>
          </div>
        `;
      }
      html += '</div>';
      container.innerHTML = html;
      console.log('✅ Rendered successfully');
    }

    function showLoading(message = 'Loading...') {
      container.innerHTML = `
        <div class="loading">
          <div class="spinner"></div>
          <p style="margin-top: 12px;">${message}</p>
        </div>
      `;
    }

    function showError(message) {
      container.innerHTML = `<div class="error">❌ Error: ${message}</div>`;
    }

    async function loadBatches(page = 1) {
      console.log('📡 Loading page', page);
      
      if (isLoading) return;
      isLoading = true;
      
      showLoading(page === 1 ? 'Fetching batches...' : 'Loading more...');

      try {
        // Simulate network delay - shows loading for 1 second
        await new Promise(resolve => setTimeout(resolve, 1000));

        console.log('🌐 Fetching API...');
        const response = await fetch(`https://pwthor.live/api/AllBatches?page=${page}`, {
          headers: {
            'Authorization': `Bearer ${TOKEN}`,
            'Content-Type': 'application/json'
          }
        });

        console.log('📥 Response status:', response.status);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const data = await response.json();
        console.log('📦 API response received');

        if (!data.success) throw new Error(data.message || 'API error');

        const newBatches = data.data || [];
        console.log('📊 Got', newBatches.length, 'batches');
        
        totalPages = data.totalPages || 1;
        
        if (page === 1) {
          allBatches = newBatches;
        } else {
          allBatches = allBatches.concat(newBatches);
        }

        renderBatches(allBatches);

        if (page < totalPages) {
          loadMoreBtn.style.display = 'block';
        } else {
          loadMoreBtn.style.display = 'none';
        }

      } catch (error) {
        console.error('❌ Error:', error);
        showError(error.message || 'Failed to load');
      } finally {
        isLoading = false;
      }
    }

    function loadMore() {
      console.log('🔄 Load more clicked');
      if (currentPage < totalPages) {
        currentPage++;
        loadBatches(currentPage);
      }
    }

    loadMoreBtn.addEventListener('click', loadMore);
    console.log('✅ Event listener added');

    console.log('⏰ Waiting 2 seconds before loading...');
  </script>

</body>
</html>
